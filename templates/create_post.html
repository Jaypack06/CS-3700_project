{% extends "base.html" %}
{% block title %}Create Post{% endblock %}
{% block content %}
    <h1 class="login_name" style="text-align: center;">CREATE POST</h1>
    <br>
    <div class="create-post">
        
        <form action="" method="post" enctype="multipart/form-data">
            <div class="post-card upload-preview">
                <!-- Header with username -->
                <div class="post-header">
                    <span class="post-username">{{ username }}</span>
                </div>

                <!-- Media - image upload area -->
                <div class="post-media" id="uploadContainer">
                    <img id="uploadPreview" src="{{ url_for('static', filename='upload_icon.png') }}" alt="Upload your image!">
                </div>

                <!-- Caption input -->
                <div class="post-caption">
                    <textarea id="text" name="text" placeholder="Add text / caption" class="caption-input"></textarea>
                </div>
            </div>

            <input type="file" id="image" name="image" accept="image/*" required style="display: none">
            <br>
            <button type="submit" class="submit-btn">Upload Post</button>
        </form>

        {% if image_url %}
            <h3>Preview</h3>
            <div class = "post-card">
                <div class="post-header">@{{ username }}</div>
                <div class="post-image"> <img src="{{ image_url }}" alt="Uploaded image" style="max-width:100%; height:auto;">  
                </div>
                <div class = "post-description"><p><strong>{{ username }}</strong> {{ text }}</p></div>
                <div class ="time">Preview</div>
            </div>
        {% endif %}
        
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var input = document.getElementById('image');
            var container = document.getElementById('uploadContainer');
            var preview = document.getElementById('uploadPreview');
            var textarea = document.getElementById('text');

            if (!input || !preview) return;

            // Click the upload container to trigger file input
            container.addEventListener('click', function() {
                input.click();
            });

            // Update preview when file is selected
            input.addEventListener('change', function(event) {
                var file = event.target.files[0];
                if (!file) return;
                preview.src = URL.createObjectURL(file);
            });

            // Auto-expand textarea as user types
            if (textarea) {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 300) + 'px';
                });
            }
        });
    </script>

{% endblock%}
